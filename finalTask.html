<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final Task</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      padding:20px;
      background:#f5f3ff;
    }

    h1{
      margin-bottom:20px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:10px;
    }

    input{
      padding:12px;
      width:250px;
      border:1px solid gray;
      border-radius:8px;
    }

    .buttons{
      margin-bottom:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      padding:10px 15px;
      border:none;
      background:#6d28d9;
      color:white;
      cursor:pointer;
      border-radius:8px;
    }

    button:hover{
        transform:scale(1.05);
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#eff6ff;
      border: 1px solid #bfdbfe;
      padding:15px;
      border-radius:10px;
      text-align:center;
      transition:0.3s;
      box-shadow:0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .card:hover{
      transform:scale(1.05);
      box-shadow:0 0 15px black;
    }

    .card img{
      width:120px;
      height:120px;
      object-fit:contain;
      margin-bottom:10px;
    }

    .card h3{
      margin-bottom:10px;
      font-size:18px;
    }

    .card p{
      margin-bottom:10px;
      color:#555;
    }

    .price{
      font-size:20px;
      font-weight:bold;
      color:black;
    }

    .addbtn{
        background:#10b981;
        color: white;
    }

    .addbtn:hover{
        box-shadow:0 0 15px black;
    }

    .rembtn{
        background:#dc2626;
        color: white;
    }

    .rembtn:hover{
        box-shadow:0 0 15px black;
    }

    .loading,
    .error{
      text-align:center;
      font-size:25px;
      margin-top:50px;
    }
  </style>
</head>

<body>

  <h1>Online Shopping</h1>

  <div class="top">
    <input type="text" id="search" placeholder="Search Product">

    <div>
      Cart Count:
      <span id="count">0</span>
      |
      Total:
      $<span id="total">0</span>
    </div>
  </div>

  <div class="buttons">
    <button onclick="showAll()">All</button>

    <button onclick="filterCategory('electronics')">
      Electronics
    </button>

    <button onclick="filterCategory('jewelery')">
      Jewelery
    </button>

    <button onclick="filterCategory(`men's clothing`)">
      Men's Clothing
    </button>

    <button onclick="filterCategory(`women's clothing`)">
      Women's Clothing
    </button>
  </div>

  <!-- Loading Message -->

  <div id="products" class="products">
    <div class="loading">Loading...</div>
  </div>

  <script>

    // Fetching Products

    let allProducts = [];
    let cart = [];

    fetch("https://fakestoreapi.com/products")

      .then((res) => res.json())

      .then((data) => {
        allProducts = data;
        displayProducts(data);
      })
      
      // Error Message

      .catch(() => {
        document.getElementById("products").innerHTML = `
          <div class="error">
            Error Fetching Data
          </div>
        `;
      });


    function displayProducts(data){

      let products = document.getElementById("products");

      products.innerHTML = "";

      data.forEach((item) => {

        products.innerHTML += `

          <div class="card">

            <img src="${item.image}">

            <h3>
              ${item.title.slice(0,20)}
            </h3>

            <p>
              ${item.description.slice(0,50)}...
            </p>

           <div class="price">
              $${item.price}
            </div>

            <button class = "addbtn"
            onclick="addToCart(${item.id})">
              Add To Cart
            </button>

            <br><br>

            <button class = "rembtn"
            onclick="removeFromCart(${item.id})">
              Remove
            </button>

          </div>

        `;
      });
    }


    // Search Feature

    document
      .getElementById("search")
      .addEventListener("keyup", (e) => {

        let value = e.target.value.toLowerCase();

        let filteredProducts = allProducts.filter((item) => {

          return item.title
            .toLowerCase()
            .includes(value);

        });

        displayProducts(filteredProducts);

      });


    // Category Filter

    function filterCategory(category){

      let filtered = allProducts.filter((item) => {

        return item.category === category;

      });

      displayProducts(filtered);
    }


    // Show All

    function showAll(){
      displayProducts(allProducts);
    }


    // Add to Cart

    function addToCart(id){

        let product = allProducts.find((item) => item.id === id);

      cart.push(product);

      updateCart();
    }


    // Remove from Cart

    function removeFromCart(id){

      let index = cart.findIndex((item) => item.id === id);

      if(index !== -1){
        cart.splice(index,1);
      }

      updateCart();
    }


    // Total Price

    function updateCart(){

      document.getElementById("count").innerText =
        cart.length;

      let total = cart.reduce((sum,item) => {

        return sum + item.price;

      },0);

      document.getElementById("total").innerText =
        total.toFixed(2);
    }

  </script>

</body>
</html>
